<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4CAF50">
<title>功課背誦登記</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg-primary: #f5f7fa;
  --bg-secondary: #ffffff;
  --bg-card: #ffffff;
  --bg-hover: #f0f0f0;
  --text-primary: #1a1a1a;
  --text-secondary: #666666;
  --text-muted: #999999;
  --border-color: #e0e0e0;
  --accent: #4CAF50;
  --accent-hover: #45a049;
  --accent-light: #e8f5e9;
  --danger: #f44336;
  --danger-light: #ffebee;
  --warning: #ff9800;
  --warning-light: #fff3e0;
  --info: #2196F3;
  --info-light: #e3f2fd;
  --check-done: #4CAF50;
  --check-done-text: #fff;
  --check-empty: #fff;
  --check-border: #d0d0d0;
  --shadow: 0 2px 4px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.12);
  --header-height: 56px;
  --tabbar-height: 64px;
}
[data-theme="dark"] {
  --bg-primary: #121212;
  --bg-secondary: #1e1e1e;
  --bg-card: #242424;
  --bg-hover: #2d2d2d;
  --text-primary: #e8e8e8;
  --text-secondary: #b0b0b0;
  --text-muted: #707070;
  --border-color: #3a3a3a;
  --accent: #66BB6A;
  --accent-hover: #81C784;
  --accent-light: #1b3a1d;
  --danger: #ef5350;
  --danger-light: #3a1a1a;
  --warning: #ffa726;
  --warning-light: #3a2a1a;
  --info: #42A5F5;
  --info-light: #1a2a3a;
  --check-done: #66BB6A;
  --check-done-text: #fff;
  --check-empty: #2a2a2a;
  --check-border: #505050;
  --shadow: 0 2px 4px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif;background:var(--bg-primary);color:var(--text-primary);font-size:16px;line-height:1.5;overscroll-behavior:none;transition:background .2s,color .2s}
body{padding-top:var(--header-height);padding-bottom:var(--tabbar-height);min-height:100vh}
button{font-family:inherit;font-size:14px;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--text-primary);background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:8px;padding:10px 12px;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.app-header{position:fixed;top:0;left:0;right:0;height:var(--header-height);background:var(--bg-secondary);border-bottom:1px solid var(--border-color);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100;box-shadow:var(--shadow)}
.app-title{font-size:17px;font-weight:700;color:var(--accent);white-space:nowrap;flex-shrink:0}
.class-selector{flex:1;min-width:0;padding:8px 10px;font-size:14px}
.icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:background .2s}
.icon-btn:hover,.icon-btn:active{background:var(--bg-hover)}
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:var(--tabbar-height);background:var(--bg-secondary);border-top:1px solid var(--border-color);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 4px rgba(0,0,0,.05)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:11px;color:var(--text-muted);padding:6px 4px;transition:color .15s}
.tab-btn .tab-icon{font-size:22px;line-height:1}
.tab-btn.active{color:var(--accent);font-weight:600}
.tab-section{display:none;padding:12px;max-width:900px;margin:0 auto}
.tab-section.active{display:block}
.section-title{font-size:18px;font-weight:700;margin:0 0 12px;color:var(--text-primary)}
.card{background:var(--bg-card);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border-color)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;user-select:none;-webkit-user-select:none}
.card-title{font-size:15px;font-weight:600;margin:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:600;background:var(--bg-hover);color:var(--text-primary);border:1px solid var(--border-color);transition:all .15s;min-height:40px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-outline{background:transparent}
.btn-sm{padding:6px 10px;font-size:13px;min-height:32px}
.btn-block{width:100%}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.form-row{display:flex;gap:8px;margin-bottom:10px;align-items:stretch}
.form-row>*{flex:1;min-width:0}
.form-row>.btn{flex:0 0 auto}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
.form-group{margin-bottom:12px}
.form-hint{font-size:12px;color:var(--text-muted);margin-top:4px}
.list-item{display:flex;align-items:center;padding:8px 12px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:8px;margin-bottom:6px;gap:8px}
.list-item-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item-meta{font-size:12px;color:var(--text-muted)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:var(--info-light);color:var(--info)}
.badge-recitation{background:var(--warning-light);color:var(--warning)}
.inline-input{background:var(--bg-secondary);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;font-size:14px;outline:none;width:100%;color:var(--text-primary)}
/* collapsible book section */
.book-section{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.book-section-header{display:flex;align-items:center;padding:12px 14px;gap:8px;cursor:pointer;user-select:none;-webkit-user-select:none;flex-wrap:wrap}
.book-section-header:active{background:var(--bg-hover)}
.book-section-title{flex:1;font-size:14px;font-weight:600;min-width:0}
.book-section-meta{font-size:11px;color:var(--text-muted)}
.book-section-arrow{font-size:12px;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.book-section.collapsed .book-section-arrow{transform:rotate(-90deg)}
.book-section.collapsed .book-section-body{display:none}
.book-section-body{padding:0 14px 14px}
.cur-lesson-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 10px;background:var(--bg-hover);border-radius:8px;flex-wrap:wrap}
.cur-lesson-bar span{font-size:13px}
.cur-lesson-bar .cur-val{font-weight:700;font-size:15px;min-width:30px;text-align:center}
/* grid */
.grid-wrapper{overflow:auto;-webkit-overflow-scrolling:touch;position:relative}
.check-grid{display:grid;font-size:13px;min-width:100%}
.grid-cell{border-bottom:1px solid var(--border-color);border-right:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;padding:4px;min-width:40px;min-height:40px;background:var(--bg-card)}
.grid-header{background:var(--bg-hover);font-weight:600;position:sticky;top:0;z-index:2;font-size:12px;flex-direction:column;gap:2px}
.grid-header .mark-all-btn{font-size:9px;padding:1px 4px;border-radius:3px;background:var(--accent);color:#fff;cursor:pointer}
.grid-name-cell{position:sticky;left:0;z-index:1;background:var(--bg-card);font-weight:500;justify-content:flex-start;padding-left:10px;min-width:90px;text-align:left;white-space:nowrap;font-size:13px}
.grid-corner{position:sticky;left:0;top:0;z-index:3;background:var(--bg-hover);font-weight:700;min-width:90px}
.check-cell{cursor:pointer;user-select:none;-webkit-user-select:none}
.check-mark{width:26px;height:26px;border-radius:6px;border:2px solid var(--check-border);background:var(--check-empty);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:transparent;transition:all .1s}
.check-cell.done .check-mark{background:var(--check-done);border-color:var(--check-done);color:var(--check-done-text)}
.check-cell:active .check-mark{transform:scale(.9)}
.summary-table{width:100%;border-collapse:collapse;font-size:13px}
.summary-table th,.summary-table td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border-color)}
.summary-table th{background:var(--bg-hover);font-weight:600;font-size:12px;color:var(--text-secondary)}
.summary-table td.col-count{width:60px;text-align:center;font-weight:700}
.severity-low{color:var(--accent)}
.severity-mid{color:var(--warning)}
.severity-high{color:var(--danger)}
.summary-empty{text-align:center;padding:20px;color:var(--text-muted);font-size:14px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state .empty-icon{font-size:48px;margin-bottom:8px;opacity:.5}
.empty-state-text{font-size:14px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-backdrop.active{display:flex}
.modal{background:var(--bg-card);border-radius:12px;padding:20px;max-width:400px;width:100%;box-shadow:var(--shadow-lg)}
.modal-title{font-size:16px;font-weight:700;margin:0 0 8px}
.modal-text{font-size:14px;color:var(--text-secondary);margin:0 0 16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:calc(var(--tabbar-height) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--text-primary);color:var(--bg-primary);padding:10px 20px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;transition:all .2s;z-index:300;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pdf-render-area{position:absolute;left:-10000px;top:0;width:1122px;background:#fff;color:#000;padding:30px;font-family:"PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif}
.pdf-render-area h1{font-size:22px;margin:0 0 4px;text-align:center;color:#000}
.pdf-render-area .pdf-meta{text-align:center;font-size:12px;color:#555;margin-bottom:16px}
.pdf-render-area h2{font-size:16px;margin:18px 0 8px;padding-bottom:4px;border-bottom:2px solid #333;color:#000}
.pdf-render-area table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;page-break-inside:avoid}
.pdf-render-area table th,.pdf-render-area table td{border:1px solid #888;padding:4px 6px;text-align:center;color:#000}
.pdf-render-area table th{background:#e8e8e8;font-weight:700}
.pdf-render-area table td.name{text-align:left;white-space:nowrap}
.pdf-render-area .pdf-check{color:#2e7d32;font-weight:700}
.pdf-render-area .pdf-miss{color:#c62828}
/* expandable edit panel */
.edit-panel{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;padding:12px;margin-top:8px}
.edit-panel .form-row{margin-bottom:8px}
@media(max-width:480px){
  .app-title{font-size:15px}
  .grid-cell{min-width:36px;min-height:36px}
  .check-mark{width:22px;height:22px;font-size:14px}
  .grid-name-cell,.grid-corner{min-width:80px;font-size:12px}
}
</style>
</head>
<body>
<header class="app-header">
  <div class="app-title">📚 功課登記</div>
  <select id="classSelector" class="class-selector"></select>
  <button id="darkModeBtn" class="icon-btn" title="切換深色模式">🌙</button>
</header>
<main>
  <section id="tab-checkin" class="tab-section active">
    <h2 class="section-title">登記進度</h2>
    <div id="checkinArea"></div>
  </section>
  <section id="tab-summary" class="tab-section">
    <h2 class="section-title">未完成總覽</h2>
    <div class="card" style="padding:10px"><label style="font-size:13px;color:var(--text-secondary)"><input type="checkbox" id="showAllStudents" style="width:auto;margin-right:4px"> 顯示全部學生</label></div>
    <div id="summaryArea"></div>
  </section>
  <section id="tab-settings" class="tab-section">
    <h2 class="section-title">設定</h2>
    <div class="card">
      <div class="card-header"><h3 class="card-title">🏫 班級管理</h3></div>
      <div class="form-row"><input type="text" id="newClassName" placeholder="班級名稱（例：三年甲班）"><button class="btn btn-primary" id="addClassBtn">新增</button></div>
      <div id="classList"></div>
    </div>
    <div class="card">
      <div class="card-header"><h3 class="card-title">👥 學生名單</h3><span id="currentClassLabel" class="list-item-meta"></span></div>
      <div class="form-group">
        <label class="form-label">批次新增（每行一位姓名）</label>
        <textarea id="bulkStudentInput" placeholder="王小明&#10;李小華&#10;張小美"></textarea>
        <div class="form-hint">已存在的姓名會跳過。</div>
      </div>
      <div class="btn-row"><button class="btn btn-primary" id="addStudentsBtn">新增學生</button><button class="btn btn-outline" id="clearStudentsBtn">清空名單</button></div>
      <div id="studentList" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <div class="card-header"><h3 class="card-title">📚 作業簿本與背誦教材</h3></div>
      <div class="form-row">
        <select id="newBookType" style="max-width:120px"><option value="homework">📖 功課</option><option value="recitation">🎤 背誦</option></select>
        <input type="text" id="newBookName" placeholder="名稱">
      </div>
      <div class="form-row">
        <div><label class="form-label">課數標籤</label><select id="newBookLabel"><option value="#">#（純數字）</option><option value="lesson">Lesson</option><option value="unit">Unit</option></select></div>
        <div><label class="form-label">起始課數</label><input type="number" id="newBookStart" value="1" min="1" max="999"></div>
        <div><label class="form-label">總課數</label><input type="number" id="newBookLessons" min="1" max="999" placeholder="必填"></div>
      </div>
      <div class="form-row">
        <div><label class="form-label">目前最新課數</label><input type="number" id="newBookCurrentLesson" placeholder="留空=全部" min="1" max="999"></div>
        <div><label class="form-label">單/雙課</label><select id="newBookLessonFilter"><option value="all">全部</option><option value="odd">只需單課</option><option value="even">只需雙課</option></select></div>
        <div><label class="form-label">跳過每第N課</label><input type="number" id="newBookSkipEvery" placeholder="不跳" min="2" max="999"></div>
      </div>
      <button class="btn btn-primary btn-block" id="addBookBtn">新增項目</button>
      <div id="bookList" style="margin-top:12px"></div>
    </div>
  </section>
  <section id="tab-export" class="tab-section">
    <h2 class="section-title">匯出</h2>
    <div class="card">
      <div class="card-header"><h3 class="card-title">📄 匯出 PDF（A4 橫式）</h3></div>
      <p class="form-hint" style="margin-bottom:10px">勾選要匯出的教材，產生 A4 橫式 PDF。</p>
      <div id="pdfBookSelector" style="margin-bottom:10px"></div>
      <div class="btn-row" style="margin-bottom:8px"><button class="btn btn-sm btn-outline" id="pdfSelectAll">全選</button><button class="btn btn-sm btn-outline" id="pdfSelectNone">全不選</button></div>
      <button class="btn btn-primary btn-block" id="exportPdfBtn">產生 PDF</button>
    </div>
    <div class="card">
      <div class="card-header"><h3 class="card-title">💾 JSON 備份/還原</h3></div>
      <p class="form-hint" style="margin-bottom:10px">匯出全部資料為 JSON 檔可備份或在其他裝置還原。</p>
      <div class="btn-row"><button class="btn btn-primary" id="exportJsonBtn">📤 匯出 JSON</button><button class="btn btn-outline" id="importJsonBtn">📥 匯入 JSON</button><input type="file" id="importJsonFile" accept=".json" style="display:none"></div>
    </div>
    <div class="card">
      <div class="card-header"><h3 class="card-title" style="color:var(--danger)">⚠️ 危險區域</h3></div>
      <button class="btn btn-danger btn-block" id="resetAllBtn">清除所有資料</button>
    </div>
  </section>
</main>
<nav class="tab-bar">
  <div class="tab-btn active" data-tab="checkin"><div class="tab-icon">✅</div><div>登記</div></div>
  <div class="tab-btn" data-tab="summary"><div class="tab-icon">📊</div><div>總覽</div></div>
  <div class="tab-btn" data-tab="settings"><div class="tab-icon">⚙️</div><div>設定</div></div>
  <div class="tab-btn" data-tab="export"><div class="tab-icon">📤</div><div>匯出</div></div>
</nav>
<div id="modalBackdrop" class="modal-backdrop"><div class="modal"><h3 class="modal-title" id="modalTitle">確認</h3><p class="modal-text" id="modalText"></p><div class="modal-actions"><button class="btn btn-outline" id="modalCancel">取消</button><button class="btn btn-danger" id="modalConfirm">確定</button></div></div></div>
<div id="toast" class="toast"></div>
<div id="pdfRenderArea" class="pdf-render-area"></div>
<script>
'use strict';
const STORAGE_KEY = 'hwReciteApp_v1';
const defaultState = () => ({version:1,darkMode:false,activeClassId:null,classes:[],books:[],records:{},collapsed:{}});
let state = loadState();
function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);if(!r)return defaultState();return Object.assign(defaultState(),JSON.parse(r))}catch(e){return defaultState()}}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){showToast('儲存失敗')}}
function uid(){return crypto.randomUUID?crypto.randomUUID():'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9)}
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
function el(tag,attrs={},...ch){const n=document.createElement(tag);for(const k in attrs){if(k==='class')n.className=attrs[k];else if(k==='style')n.style.cssText=attrs[k];else if(k.startsWith('on')&&typeof attrs[k]==='function')n.addEventListener(k.slice(2).toLowerCase(),attrs[k]);else if(k==='dataset')Object.assign(n.dataset,attrs[k]);else n.setAttribute(k,attrs[k])}for(const c of ch){if(c==null||c===false)continue;n.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c)}return n}
let toastTimer;
function showToast(m,d=2000){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),d)}
function confirmDialog(title,text){return new Promise(r=>{$('#modalTitle').textContent=title;$('#modalText').textContent=text;const b=$('#modalBackdrop');b.classList.add('active');const done=v=>{b.classList.remove('active');$('#modalConfirm').onclick=null;$('#modalCancel').onclick=null;b.onclick=null;r(v)};$('#modalConfirm').onclick=()=>done(true);$('#modalCancel').onclick=()=>done(false);b.onclick=e=>{if(e.target===b)done(false)}})}
function getActiveClass(){return state.classes.find(c=>c.id===state.activeClassId)||null}
function getBooksForActiveClass(type){return state.books.filter(b=>b.classId===state.activeClassId&&(!type||b.type===type))}
function recordKey(bid,l,sid){return bid+':'+l+':'+sid}
function isDone(bid,l,sid){return !!state.records[recordKey(bid,l,sid)]}
function setDone(bid,l,sid,d){const k=recordKey(bid,l,sid);if(d)state.records[k]=true;else delete state.records[k]}
function ensureBookDefaults(b){if(b.startLesson===undefined)b.startLesson=1;if(!b.lessonLabel)b.lessonLabel='#';if(b.currentLesson===undefined)b.currentLesson=0;if(!b.lessonFilter)b.lessonFilter='all';if(b.skipEvery===undefined)b.skipEvery=0}
function getRequiredLessons(b){ensureBookDefaults(b);const start=b.startLesson||1;const end=b.currentLesson>0?Math.min(b.currentLesson,b.totalLessons):b.totalLessons;const lessons=[];for(let n=start;n<=end;n++){if(b.lessonFilter==='odd'&&n%2===0)continue;if(b.lessonFilter==='even'&&n%2===1)continue;if(b.skipEvery>0&&n%b.skipEvery===0)continue;lessons.push(n)}return lessons}
function fmtLesson(b,n){ensureBookDefaults(b);if(b.lessonLabel==='lesson')return 'L'+n;if(b.lessonLabel==='unit')return 'U'+n;return String(n)}
function fmtLessonFull(b,n){ensureBookDefaults(b);if(b.lessonLabel==='lesson')return 'Lesson '+n;if(b.lessonLabel==='unit')return 'Unit '+n;return String(n)}

async function exportPdf(){const cls=getActiveClass();if(!cls)return showToast('請先選擇班級');if(!cls.students.length)return showToast('班級尚無學生');
const ids=getSelectedPdfBookIds();if(!ids.length)return showToast('請至少勾選一項教材');
showToast('PDF 產生中...',5000);if(!buildPdfContent(ids))return;await new Promise(r=>setTimeout(r,100));
try{const canvas=await html2canvas($('#pdfRenderArea'),{scale:2,backgroundColor:'#fff',useCORS:true,logging:false});
const{jsPDF}=window.jspdf;const pdf=new jsPDF('l','mm','a4');const W=297,H=210,imgH=canvas.height*W/canvas.width;
if(imgH<=H){pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,W,imgH)}else{const ppx=canvas.width*H/W;let y=0,pg=0;while(y<canvas.height){const sh=Math.min(ppx,canvas.height-y);const sl=document.createElement('canvas');sl.width=canvas.width;sl.height=sh;sl.getContext('2d').drawImage(canvas,0,y,canvas.width,sh,0,0,canvas.width,sh);if(pg>0)pdf.addPage();pdf.addImage(sl.toDataURL('image/png'),'PNG',0,0,W,sh*W/canvas.width);y+=sh;pg++}}
pdf.save(cls.name+'_進度表_'+new Date().toISOString().slice(0,10)+'.pdf');showToast('PDF 已產生')}catch(e){console.error(e);showToast('PDF 失敗：'+e.message,4000)}finally{$('#pdfRenderArea').innerHTML=''}}

$('#exportJsonBtn').addEventListener('click',()=>{const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='homework_backup_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);showToast('已匯出')});
$('#importJsonBtn').addEventListener('click',()=>$('#importJsonFile').click());
$('#importJsonFile').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;const ok=await confirmDialog('匯入','匯入將覆蓋所有資料，確定？');e.target.value='';if(!ok)return;try{const d=JSON.parse(await f.text());if(!d||!Array.isArray(d.classes))throw new Error('格式不正確');state=Object.assign(defaultState(),d);saveState();applyTheme();renderAll();showToast('已匯入')}catch(err){showToast('失敗：'+err.message,4000)}});
$('#resetAllBtn').addEventListener('click',async()=>{const ok=await confirmDialog('清除所有資料','無法復原，確定？');if(!ok)return;state=defaultState();saveState();applyTheme();renderAll();showToast('已清除')});

// Init
applyTheme();renderAll();switchTab('checkin')
</script>
</body>
</html>
